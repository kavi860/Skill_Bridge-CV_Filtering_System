<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill Bridge • Qualification Ranking</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="script.js" defer></script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 min-h-screen selection:bg-indigo-100 selection:text-indigo-900 overflow-y-scroll custom-scrollbar">

  <!-- Header -->
  <header class="bg-[#2B4393] sticky top-0 z-50 shadow-md">
    <div class="max-w-[1400px] mx-auto px-8 h-[72px] flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-[42px] h-[42px] bg-[#597AF5] rounded-[10px] flex items-center justify-center text-white text-lg shadow-inner">
          <i class="fa-solid fa-layer-group"></i>
        </div>
        <div class="flex items-center gap-4 pl-1">
          <span class="text-[22px] font-[900] tracking-tight text-white relative top-[1px]">Skill Bridge</span>
          <span class="text-[10px] font-[800] tracking-[0.1em] text-[#597AF5] bg-white px-2.5 py-1 rounded-[4px] uppercase mt-0.5">MATCHING SYSTEM</span>
        </div>
      </div>
      
      <div class="flex items-center gap-9 text-[14px] font-[600] text-[#8C9DF0]">
        <a href="#" class="hover:text-white transition">Vacancies</a>
        <a href="#" class="text-[#98ADF0]">Candidate Ranking</a>
        
        <div class="flex items-center gap-4 pl-8 border-l border-white/30 ml-2">
          <div class="text-right leading-[1.2] mt-0.5">
            <p class="font-[800] text-[14px] text-white">Alex Rivera</p>
            <p class="text-[9px] font-[800] text-white/90 uppercase tracking-[0.15em] mt-0.5">HR Director</p>
          </div>
          <div class="w-[42px] h-[42px] bg-white rounded-full flex items-center justify-center text-slate-500 text-lg shadow-sm">
            <i class="fa-solid fa-user"></i>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="max-w-[1400px] mx-auto px-8 py-8 grid grid-cols-12 gap-8">
    
    <!-- LEFT: Vacancies -->
    <div class="col-span-12 lg:col-span-4 space-y-6">
      <div class="glass-card rounded-2xl overflow-hidden">
        <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between bg-white">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center">
              <i class="fa-solid fa-briefcase"></i>
            </div>
            <h2 class="font-bold text-lg text-slate-800">Active Vacancies</h2>
          </div>
          <span class="px-2.5 py-1 text-[10px] font-bold tracking-wider bg-emerald-50 text-emerald-600 rounded-md border border-emerald-100">3 OPEN</span>
        </div>
        <div id="vacancy-list" class="p-4 space-y-3 bg-slate-50/50"></div>
      </div>

      <div id="vacancy-requirements" class="hidden glass-card rounded-2xl p-6">
        <h3 class="font-bold text-sm text-slate-800 uppercase tracking-wider mb-4 flex items-center gap-2">
          <i class="fa-solid fa-list-check text-indigo-500"></i>
          Required Skills
        </h3>
        <div id="req-skills" class="flex flex-wrap gap-2"></div>
      </div>
    </div>

    <!-- RIGHT: Dashboard -->
    <div id="ranking-dashboard" class="col-span-12 lg:col-span-8 flex flex-col gap-6">
      
      <div class="flex justify-between items-end">
        <div>
          <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Candidate Ranking</h1>
          <p id="selected-vacancy-name" class="text-slate-500 mt-1.5 font-medium"></p>
        </div>
        
        <div class="flex items-center gap-3">
          <div class="relative">
            <input id="search-input" onkeyup="filterTable()" placeholder="Search..." 
                   class="w-64 glass-card rounded-xl px-4 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 transition pl-10">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-2.5 text-slate-400 text-sm"></i>
          </div>
          <select id="sort-select" onchange="sortTable()" 
                  class="glass-card rounded-xl px-4 py-2 text-sm text-slate-700 font-medium focus:outline-none cursor-pointer">
            <option value="score">Sort by Match Score</option>
            <option value="name">Sort by Name</option>
            <option value="exp">Sort by Experience</option>
          </select>
          <button id="fullscreen-btn" onclick="toggleFullscreen()" class="glass-card rounded-xl px-4 py-2 text-sm font-semibold text-slate-700 hover:text-indigo-600 transition flex items-center gap-2">
            <i class="fa-solid fa-expand"></i> Fullscreen
          </button>
        </div>
      </div>

      <div id="stats-section" class="grid grid-cols-3 gap-4"></div>
      
      <div class="glass-card rounded-2xl overflow-hidden flex-1 flex flex-col">
        <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between bg-white">
          <h3 class="font-bold text-sm text-slate-800 uppercase tracking-wider flex items-center gap-2">
            <i class="fa-solid fa-ranking-star text-amber-500 text-lg"></i>
            Full Qualification Ranking
          </h3>
        </div>
        
        <div id="ranking-table-section" class="overflow-x-auto flex-1 bg-white"></div>
        
        <div id="empty-state" class="py-24 flex flex-col items-center bg-slate-50/50">
          <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-300 text-3xl mb-4">
            <i class="fa-solid fa-inbox"></i>
          </div>
          <h3 class="font-bold text-lg text-slate-700">No candidates available</h3>
          <p class="text-slate-400 text-sm mt-1">Select a vacancy to compute rankings.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[999] p-4">
    <div onclick="event.stopImmediatePropagation()" class="bg-white rounded-3xl max-w-2xl w-full mx-auto overflow-hidden shadow-2xl modal-enter border border-slate-100">
      <div id="modal-content" class="p-8"></div>
    </div>
  </div>

  <!-- Processing Toast -->
  <div id="analysis-status" class="hidden fixed bottom-8 right-8 glass-card rounded-2xl px-6 py-4 flex items-center gap-4 toast z-[1000]">
    <div class="w-5 h-5 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
    <div>
      <p class="text-sm font-bold text-slate-800">Computing match scores...</p>
      <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider mt-0.5">Analyzing CV keywords</p>
    </div>
  </div>
</body>
</html>
